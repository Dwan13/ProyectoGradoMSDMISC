<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <style>
      .t1{font:700 58px 'Segoe UI',Arial,sans-serif;fill:#0f172a}
      .t2{font:500 34px 'Segoe UI',Arial,sans-serif;fill:#334155}
      .h{font:700 28px 'Segoe UI',Arial,sans-serif}
      .b{font:700 29px 'Segoe UI',Arial,sans-serif;fill:#111827}
      .p{font:500 22px 'Segoe UI',Arial,sans-serif;fill:#1f2937}
      .s{font:500 20px 'Segoe UI',Arial,sans-serif;fill:#475569}
      .tag{font:700 18px 'Segoe UI',Arial,sans-serif;fill:#fff}
      .leg{font:500 20px 'Segoe UI',Arial,sans-serif;fill:#1f2937}
    </style>
    <marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#111827"/></marker>
  </defs>

  <rect width="1920" height="1080" fill="#f6f8fc"/>
  <text x="960" y="76" text-anchor="middle" class="t1">C4 - RATE LIMITING</text>
  <text x="960" y="123" text-anchor="middle" class="t2">Configuracion S2: policy en NGINX Ingress, benchmark por NodePort HTTP</text>

  <rect x="34" y="170" width="270" height="750" rx="18" fill="#eef4ff" stroke="#7aa7ff" stroke-width="2"/>
  <text x="58" y="214" class="h" fill="#1d4ed8">1. Generacion de Carga</text>
  <polygon points="112,332 166,250 220,332" fill="#7c5cff"/>
  <text x="166" y="311" text-anchor="middle" class="b" fill="#ffffff">k6</text>
  <text x="92" y="430" class="b">Runner S2</text>
  <text x="76" y="510" class="p">NodePort HTTP</text>
  <text x="76" y="560" class="p">/login</text>
  <text x="76" y="605" class="p">/profile</text>
  <text x="76" y="650" class="p">/users</text>

  <rect x="410" y="170" width="620" height="750" rx="18" fill="#f7f3ff" stroke="#b69aff" stroke-width="2"/>
  <text x="720" y="214" text-anchor="middle" class="h" fill="#5b21b6">2. Politica de Rate Limit</text>

  <rect x="430" y="245" width="580" height="180" rx="16" fill="#ffffff" stroke="#d8ccff" stroke-width="2"/>
  <circle cx="505" cy="335" r="38" fill="#6b7280"/>
  <text x="505" y="345" text-anchor="middle" class="tag">B</text>
  <text x="570" y="316" class="b">Baseline</text>
  <rect x="570" y="332" width="116" height="34" rx="8" fill="#6b7280"/><text x="628" y="355" text-anchor="middle" class="tag">sin limite</text>
  <text x="706" y="356" class="p">ingress sin limit-rps</text>
  <text x="570" y="392" class="s">Sin control de tasa en el gateway.</text>

  <rect x="430" y="455" width="580" height="180" rx="16" fill="#ffffff" stroke="#d8ccff" stroke-width="2"/>
  <circle cx="505" cy="545" r="38" fill="#2563eb"/>
  <path d="M492 546 L505 533 L518 546" fill="none" stroke="#fff" stroke-width="6"/>
  <path d="M505 533 L505 566" stroke="#fff" stroke-width="6"/>
  <text x="570" y="526" class="b">Moderate</text>
  <rect x="570" y="542" width="106" height="34" rx="8" fill="#2563eb"/><text x="623" y="565" text-anchor="middle" class="tag">1200 rpm</text>
  <text x="694" y="566" class="p">aprox. 20 rps</text>
  <text x="570" y="602" class="s">Separacion visible solo en carga alta.</text>

  <rect x="430" y="665" width="580" height="180" rx="16" fill="#ffffff" stroke="#d8ccff" stroke-width="2"/>
  <circle cx="505" cy="755" r="38" fill="#dc2626"/>
  <rect x="490" y="745" width="30" height="20" rx="4" fill="#fff"/>
  <text x="570" y="736" class="b">Strict</text>
  <rect x="570" y="752" width="92" height="34" rx="8" fill="#dc2626"/><text x="616" y="775" text-anchor="middle" class="tag">300 rpm</text>
  <text x="680" y="776" class="p">aprox. 5 rps</text>
  <text x="570" y="812" class="s">429 visible si el trafico entra por ingress.</text>

  <rect x="1120" y="170" width="420" height="750" rx="18" fill="#f2fff5" stroke="#69c280" stroke-width="2"/>
  <text x="1330" y="214" text-anchor="middle" class="h" fill="#15803d">3. Microservicios (mubench-real)</text>

  <rect x="1140" y="250" width="380" height="118" rx="14" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <circle cx="1190" cy="309" r="24" fill="#16a34a"/>
  <rect x="1182" y="306" width="16" height="18" rx="3" fill="#fff"/>
  <rect x="1185" y="296" width="10" height="10" rx="5" fill="none" stroke="#fff" stroke-width="3"/>
  <text x="1240" y="300" class="b">auth-service</text>
  <text x="1240" y="336" class="s">Puerto: 8080   Endpoint: /login</text>

  <rect x="1140" y="392" width="380" height="128" rx="14" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <polygon points="1190,428 1214,442 1214,470 1190,484 1166,470 1166,442" fill="#2563eb"/>
  <text x="1240" y="443" class="b">api-service</text>
  <text x="1240" y="479" class="s">Puerto: 8080   /profile, /users</text>

  <rect x="1140" y="542" width="380" height="110" rx="14" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <ellipse cx="1190" cy="580" rx="24" ry="10" fill="#d97706"/>
  <rect x="1166" y="580" width="48" height="22" fill="#d97706"/>
  <ellipse cx="1190" cy="602" rx="24" ry="10" fill="#d97706"/>
  <text x="1240" y="592" class="b">data-service</text>
  <text x="1240" y="623" class="s">Puerto: 8080</text>

  <rect x="1140" y="676" width="380" height="120" rx="14" fill="#fff8ea" stroke="#f59e0b" stroke-width="2"/>
  <ellipse cx="1190" cy="716" rx="24" ry="10" fill="#d97706"/>
  <rect x="1166" y="716" width="48" height="24" fill="#d97706"/>
  <ellipse cx="1190" cy="740" rx="24" ry="10" fill="#d97706"/>
  <text x="1240" y="723" class="b">PostgreSQL</text>
  <text x="1240" y="758" class="s">Puerto: 5432</text>

  <rect x="1640" y="170" width="246" height="750" rx="18" fill="#fff7ed" stroke="#f2a85b" stroke-width="2"/>
  <text x="1763" y="214" text-anchor="middle" class="h" fill="#ea580c">4. Monitoreo y Metricas</text>
  <circle cx="1763" cy="350" r="42" fill="#f97316"/>
  <path d="M1763 322 C1745 340 1755 346 1751 360 C1747 372 1755 383 1763 388 C1771 383 1779 372 1775 360 C1771 346 1781 340 1763 322 Z" fill="#fff"/>
  <text x="1763" y="438" text-anchor="middle" class="b">Prometheus</text>
  <text x="1763" y="472" text-anchor="middle" class="s">Recoleccion</text>
  <circle cx="1763" cy="600" r="42" fill="#f59e0b"/>
  <circle cx="1763" cy="600" r="18" fill="none" stroke="#fff" stroke-width="8"/>
  <text x="1763" y="688" text-anchor="middle" class="b">Grafana</text>
  <text x="1763" y="722" text-anchor="middle" class="s">Dashboards</text>

  <line x1="304" y1="514" x2="410" y2="514" stroke="#111827" stroke-width="4" marker-end="url(#a)"/>
  <text x="356" y="493" text-anchor="middle" class="s">HTTP</text>
  <line x1="1030" y1="514" x2="1120" y2="514" stroke="#111827" stroke-width="4" marker-end="url(#a)"/>
  <line x1="1540" y1="514" x2="1640" y2="514" stroke="#111827" stroke-width="3" stroke-dasharray="12,10" marker-end="url(#a)"/>
  <line x1="1330" y1="368" x2="1330" y2="392" stroke="#111827" stroke-width="3" marker-end="url(#a)"/>
  <line x1="1330" y1="520" x2="1330" y2="542" stroke="#111827" stroke-width="3" marker-end="url(#a)"/>
  <line x1="1330" y1="652" x2="1330" y2="676" stroke="#111827" stroke-width="3" marker-end="url(#a)"/>

  <rect x="36" y="958" width="1848" height="78" rx="14" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="88" y="1006" class="leg">Leyenda:</text>
  <polygon points="206,1003 220,982 234,1003" fill="#7c5cff"/><text x="250" y="1007" class="leg">k6 runner</text>
  <rect x="404" y="985" width="22" height="22" rx="6" fill="#a78bfa"/><text x="440" y="1007" class="leg">Control evaluado</text>
  <rect x="650" y="985" width="22" height="22" rx="6" fill="#69c280"/><text x="686" y="1007" class="leg">Microservicio</text>
  <rect x="892" y="985" width="22" height="22" rx="6" fill="#f59e0b"/><text x="928" y="1007" class="leg">Base de datos</text>
  <line x1="1132" y1="996" x2="1188" y2="996" stroke="#111827" stroke-width="3" stroke-dasharray="12,10"/><text x="1204" y="1007" class="leg">Flujo de metricas</text>
</svg>
