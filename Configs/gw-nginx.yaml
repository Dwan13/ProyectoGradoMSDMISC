apiVersion: apps/v1
kind: Deployment
metadata:
  name: gw-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gw-nginx
  template:
    metadata:
      labels:
        app: gw-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: nginx-config
          configMap:
            name: gw-nginx-config
