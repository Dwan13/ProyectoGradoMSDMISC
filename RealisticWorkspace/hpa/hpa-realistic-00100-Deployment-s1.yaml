# HPA para auth (auth-service): genera JWTs, escalado intermedio.
# Umbral medio: latencia de crypto es predecible.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth
  namespace: mubench-realistic
spec:
  minReplicas: 1
  maxReplicas: 15
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 55
