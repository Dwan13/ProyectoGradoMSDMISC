# HPA para sdb-data (data-service): simula DB, escalado conservador.
# Umbral alto: las DBs reales no escalan fácil, simula ese comportamiento.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sdb-data
  namespace: mubench-realistic
spec:
  minReplicas: 1
  maxReplicas: 8
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sdb-data
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
