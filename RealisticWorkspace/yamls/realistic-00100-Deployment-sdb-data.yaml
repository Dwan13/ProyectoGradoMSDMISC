apiVersion: apps/v1 # for versions before 1.9.0 use apps/v1beta2
kind: Deployment
metadata:
  name: sdb-data
  namespace: mubench-realistic
  labels:
    zone: default
    app: sdb-data
    version: "1.0"
  annotations:
    something: something
spec:
  selector:
    matchLabels:
      app: sdb-data
  replicas: 1
  
  template:
    metadata:
      labels:
        zone: default
        app: sdb-data
        version: "1.0"
        prometheus.io/scrape: 'true'
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '8080'
    spec:
      terminationGracePeriodSeconds : 3
      schedulerName: default-scheduler
      containers:
        - name: sdb-data
          image: msvcbench/microservice:latest
          ports:
            - name: http-mubpodport
              containerPort: 8080
            - name: https-mubpod
              containerPort: 8443
          volumeMounts:
            - name: podinfo
              mountPath: /etc/podinfo
            - name: microservice-workmodel
              mountPath: /app/MSConfig
            - name: microservice-internal-services
              mountPath: /app/MSConfig/InternalServiceFunctions
            {{TLS_VOLUME_MOUNT}}
          env:
            - name: APP
              value: sdb-data
            - name: ZONE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['zone']
            - name: K8S_APP
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['app']
            - name: PN
              value: '2'
            - name: TN
              value: '8'
            - name: COMM_PROTOCOL
              value: {{COMM_PROTOCOL}}
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          readinessProbe:
            httpGet:
              path: /metrics
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /metrics
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources: 
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 128Mi    
        
        

      

      volumes:
        - name: podinfo
          downwardAPI:
            items:
              - path: "labels"
                fieldRef:
                  fieldPath: metadata.labels
              - path: "annotations"
                fieldRef:
                  fieldPath: metadata.annotations
        - name: microservice-workmodel
          configMap:
            name: workmodel
        - name: microservice-internal-services
          configMap:
            name: internal-services
        {{TLS_VOLUME}}
