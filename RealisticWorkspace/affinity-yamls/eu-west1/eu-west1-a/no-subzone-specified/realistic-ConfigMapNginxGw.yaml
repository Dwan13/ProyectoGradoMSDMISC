apiVersion: v1
data:
  nginx.conf: "user nginx;\nworker_processes  1;\nerror_log  /etc/nginx/error.log;\n\
    events {\n  worker_connections  10240;\n}\nhttp {\n    log_format  main\n    '[GATEWAY]\
    \ - '\n    '$remote_addr - - '\n    '[$time_local] '\n    '\"$request_method '\n\
    \    '$request_uri\" '\n    '$status -'\n    ' http:/$request_uri.mubench-realistic.svc.cluster.local';\n\
    \n    access_log  /etc/nginx/access.log main;\n    #access_log  /var/log/nginx/access.log\
    \ main;\n    access_log on;\n\n    server {\n            listen       80;\n  \
    \          server_name  _;\n            location / {\n                proxy_read_timeout\
    \ 5m;\n                proxy_connect_timeout 5m;\n                proxy_send_timeout\
    \ 5m;\n                resolver kube-dns.kube-system.svc.cluster.local;\n    \
    \            proxy_pass http:/$request_uri.mubench-realistic.svc.cluster.local/api/v1;\n\
    \                proxy_http_version 1.1;\n            }\n            location\
    \ ~* /update$ {\n                resolver kube-dns.kube-system.svc.cluster.local;\n\
    \                rewrite ^(/.*)/update$ /update break;\n                proxy_pass\
    \ http:/$1.mubench-realistic.svc.cluster.local;\n                proxy_http_version\
    \ 1.1;\n            }\n    }\n}\n"
kind: ConfigMap
metadata:
  name: gw-nginx
  namespace: mubench-realistic
