apiVersion: v1
kind: Service
metadata:
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: '80'
    prometheus.io/scrape: 'true'
  labels:
    app: sdb-data
  name: sdb-data
  namespace: mubench-realistic
spec:
  ports:
  - name: http-mubserviceport
    port: 80
    targetPort: 8080
  - name: https-mubserviceport
    port: 443
    targetPort: 8443
  - name: grpc-mubserviceport
    port: 51313
    targetPort: 51313
  selector:
    app: sdb-data
  type: ClusterIP
