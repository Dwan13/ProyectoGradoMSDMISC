apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kong-realistic-ingress
  namespace: realistic
  annotations:
    kubernetes.io/ingress.class: kong
    konghq.com/protocols: "https"
spec:
  tls:
    - hosts:
        - realistic.local
      secretName: realistic-tls
  rules:
    - host: realistic.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 8080
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 8080
