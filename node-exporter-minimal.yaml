apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter-minimal
  namespace: monitoring
  labels:
    app: node-exporter-minimal
spec:
  selector:
    matchLabels:
      app: node-exporter-minimal
  template:
    metadata:
      labels:
        app: node-exporter-minimal
    spec:
      containers:
      - name: node-exporter
        image: quay.io/prometheus/node-exporter:v1.11.1
        args:
        - --path.procfs=/host/proc
        - --path.sysfs=/host/sys
        ports:
        - containerPort: 9100
          name: metrics
        volumeMounts:
        - name: proc
          mountPath: /host/proc
          readOnly: true
        - name: sys
          mountPath: /host/sys
          readOnly: true
      hostNetwork: true
      hostPID: true
      volumes:
      - name: proc
        hostPath:
          path: /proc
          type: Directory
      - name: sys
        hostPath:
          path: /sys
          type: Directory
      tolerations:
      - operator: Exists
