apiVersion: v1
kind: ConfigMap
metadata:
  name: ratelimit-strict-config
  namespace: default
data:
  description: "Strict configuration for Rate Limiting experiment."
---
apiVersion: v1
kind: Service
metadata:
  name: ratelimit-strict
  namespace: default
spec:
  selector:
    app: ratelimit-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
