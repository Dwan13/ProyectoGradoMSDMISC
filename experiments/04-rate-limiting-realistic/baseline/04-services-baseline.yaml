apiVersion: v1
kind: ConfigMap
metadata:
  name: ratelimit-baseline-config
  namespace: default
data:
  description: "Baseline configuration for Rate Limiting experiment."
---
apiVersion: v1
kind: Service
metadata:
  name: ratelimit-baseline
  namespace: default
spec:
  selector:
    app: ratelimit-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
