apiVersion: v1
kind: Secret
metadata:
  name: postgres-s3-secret
  namespace: mubench-advanced
type: Opaque
stringData:
  POSTGRES_USER: mubench
  POSTGRES_PASSWORD: mubench
  POSTGRES_DB: mubench_s3
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-s3-init
  namespace: mubench-advanced
data:
  01-init.sql: |
    CREATE TABLE IF NOT EXISTS app_users (
      id SERIAL PRIMARY KEY,
      username TEXT NOT NULL UNIQUE,
      email TEXT NOT NULL UNIQUE,
      created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_app_users_created_at ON app_users (created_at DESC);
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-s3
  namespace: mubench-advanced
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-s3
  template:
    metadata:
      labels:
        app: postgres-s3
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-s3-secret
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: pgdata
          emptyDir: {}
        - name: init-sql
          configMap:
            name: postgres-s3-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-s3
  namespace: mubench-advanced
spec:
  selector:
    app: postgres-s3
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-s3
  namespace: mubench-advanced
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service-s3
  template:
    metadata:
      labels:
        app: auth-service-s3
    spec:
      containers:
        - name: auth-service
          image: localhost:32000/mubench/auth-service:v1
          imagePullPolicy: Always
          env:
            - name: JWT_SECRET
              value: mubench-dev-secret
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service-s3
  namespace: mubench-advanced
spec:
  type: NodePort
  selector:
    app: auth-service-s3
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 31184
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-service-s3
  namespace: mubench-advanced
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-service-s3
  template:
    metadata:
      labels:
        app: data-service-s3
    spec:
      containers:
        - name: data-service
          image: localhost:32000/mubench/data-service:v1
          imagePullPolicy: Always
          env:
            - name: DB_HOST
              value: postgres-s3
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-s3-secret
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-s3-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-s3-secret
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 8
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: data-service-s3
  namespace: mubench-advanced
spec:
  type: NodePort
  selector:
    app: data-service-s3
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 31182
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service-s3
  namespace: mubench-advanced
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-service-s3
  template:
    metadata:
      labels:
        app: api-service-s3
    spec:
      containers:
        - name: api-service
          image: localhost:32000/mubench/api-service:v1
          imagePullPolicy: Always
          env:
            - name: JWT_SECRET
              value: mubench-dev-secret
            - name: DATA_SERVICE_URL
              value: http://data-service-s3:8080
            - name: RATE_LIMIT_ENABLED
              value: "false"
            - name: RATE_LIMIT_RPM
              value: "600"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-service-s3
  namespace: mubench-advanced
spec:
  type: NodePort
  selector:
    app: api-service-s3
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 31181
