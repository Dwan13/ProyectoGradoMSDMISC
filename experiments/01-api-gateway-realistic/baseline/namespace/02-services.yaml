apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: realistic-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - env:
        - name: JWT_SECRET
          value: mubench-dev-secret
        image: localhost:32000/mubench/auth-service:v1
        imagePullPolicy: Always
        name: auth-service
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: auth-service
  name: auth-service
  namespace: realistic-nginx
spec:
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  selector:
    app: auth-service
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-service
  namespace: realistic-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-service
  template:
    metadata:
      labels:
        app: data-service
    spec:
      containers:
      - env:
        - name: DB_HOST
          value: postgres
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              key: POSTGRES_DB
              name: postgres-secret
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              key: POSTGRES_USER
              name: postgres-secret
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              key: POSTGRES_PASSWORD
              name: postgres-secret
        image: localhost:32000/mubench/data-service:v1
        imagePullPolicy: Always
        name: data-service
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 8
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: data-service
  name: data-service
  namespace: realistic-nginx
spec:
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  selector:
    app: data-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: realistic-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
    spec:
      containers:
      - env:
        - name: JWT_SECRET
          value: mubench-dev-secret
        - name: DATA_SERVICE_URL
          value: http://data-service:8080
        - name: RATE_LIMIT_ENABLED
          value: "false"
        - name: RATE_LIMIT_RPM
          value: "600"
        image: localhost:32000/mubench/api-service:v1
        imagePullPolicy: Always
        name: api-service
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: api-service
  name: api-service
  namespace: realistic-nginx
spec:
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  selector:
    app: api-service
  type: ClusterIP
