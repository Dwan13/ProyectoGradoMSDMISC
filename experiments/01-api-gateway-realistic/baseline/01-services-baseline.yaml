apiVersion: v1
kind: ConfigMap
metadata:
  name: baseline-config
  namespace: default
data:
  description: "Baseline configuration for API Gateway experiment."
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-baseline
  namespace: default
spec:
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
