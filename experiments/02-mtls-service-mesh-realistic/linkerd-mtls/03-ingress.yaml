apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: realistic-gateway
  namespace: realistic-linkerd-mtls
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: public
  tls:
    - hosts:
        - realistic-linkerd-mtls.local
      secretName: nginx-tls
  rules:
    - host: realistic-linkerd-mtls.local
      http:
        paths:
          - path: /auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-service
                port:
                  number: 8080
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-service
                port:
                  number: 8080
