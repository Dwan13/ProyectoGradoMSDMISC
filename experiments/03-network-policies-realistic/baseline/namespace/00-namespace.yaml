apiVersion: v1
kind: Namespace
metadata:
  name: realistic-without-network-policies
  labels:
    # C3 baseline: SIN NetworkPolicies. Tráfico pod-to-pod totalmente abierto
    # dentro del namespace y desde otros namespaces (allow-all por defecto en CNI).
    # Excluimos inyección de sidecars para que la única variable controlada
    # sea la política de red (no se cuele mTLS).
    istio-injection: disabled
    linkerd.io/inject: disabled
  