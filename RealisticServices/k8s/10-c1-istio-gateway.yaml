# C1/istio variant — Istio Gateway exposing realistic.local over HTTPS
# Routes /auth/* → auth-service:8080 and /api/* → api-service:8080
# (paths are rewritten so backends receive root paths, matching nginx/kong)
#
# Prerequisite: secret 'realistic-tls' must exist in namespace istio-system.
# The bootstrap/apply-scenario script copies it from realistic→istio-system.
---
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: realistic-gateway
  namespace: realistic
spec:
  selector:
    istio: ingressgateway   # default istio-ingressgateway in istio-system
  servers:
    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: realistic-tls   # secret must live in istio-system
      hosts:
        - realistic.local
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: realistic-vs
  namespace: realistic
spec:
  hosts:
    - realistic.local
  gateways:
    - realistic-gateway
  http:
    # Auth: strip /auth prefix → backend receives /login, /verify, etc.
    - match:
        - uri:
            prefix: /auth/
      rewrite:
        uri: /
      route:
        - destination:
            host: auth-service.realistic.svc.cluster.local
            port:
              number: 8080
    # API: strip /api prefix → backend receives /products, /products/{id}
    - match:
        - uri:
            prefix: /api/
      rewrite:
        uri: /
      route:
        - destination:
            host: api-service.realistic.svc.cluster.local
            port:
              number: 8080
