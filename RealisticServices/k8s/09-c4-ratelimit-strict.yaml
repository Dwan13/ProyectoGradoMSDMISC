# C4 Rate Limiting - Variante STRICT
# 300 rpm (5 req/s) por IP - aplicada en Kong API Gateway
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: ratelimit-strict
  namespace: realistic
plugin: rate-limiting
config:
  minute: 300
  policy: local
  limit_by: ip
  fault_tolerant: true
  hide_client_headers: false
