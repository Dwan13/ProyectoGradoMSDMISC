apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: realistic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: localhost:32000/mubench/auth-service:v1
          imagePullPolicy: Always
          env:
            - name: JWT_SECRET
              value: mubench-dev-secret
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: realistic
  labels:
    app: auth-service
spec:
  type: NodePort
  selector:
    app: auth-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30084
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-service
  namespace: realistic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-service
  template:
    metadata:
      labels:
        app: data-service
    spec:
      containers:
        - name: data-service
          image: localhost:32000/mubench/data-service:v1
          imagePullPolicy: Always
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 8
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: data-service
  namespace: realistic
  labels:
    app: data-service
spec:
  selector:
    app: data-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: realistic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
    spec:
      containers:
        - name: api-service
          image: localhost:32000/mubench/api-service:v1
          imagePullPolicy: Always
          env:
            - name: JWT_SECRET
              value: mubench-dev-secret
            - name: DATA_SERVICE_URL
              value: http://data-service:8080
            - name: RATE_LIMIT_ENABLED
              value: "false"
            - name: RATE_LIMIT_RPM
              value: "600"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: realistic
  labels:
    app: api-service
spec:
  type: NodePort
  selector:
    app: api-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30081
