# Mini-WAF SQLi para Istio Gateway (EnvoyFilter + Lua)
# Subset reducido OWASP CRS REQUEST-942. Equivalente funcional al KongPlugin
# pre-function (12-c1-kong-waf-lua.yaml) — mismos patrones, misma lógica.
# Inspecciona path+query+body, normaliza con string.lower(), responde 403
# si encuentra cualquier patrón. Header x-waf-block indica el motivo.
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: realistic-waf-sqli
  namespace: istio-system
spec:
  workloadSelector:
    labels:
      istio: ingressgateway
  configPatches:
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.lua
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
            inline_code: |
              -- Mini-WAF SQLi — subset OWASP CRS REQUEST-942
              -- 12 patrones lógicos expandidos a Lua patterns (sin alternación |)
              local patterns = {
                -- 1. UNION SELECT (con o sin ALL)
                "union%s+select",
                "union%s+all%s+select",
                -- 2. OR/AND tautología numérica  (or 1=1, and 1=1, or 2=2)
                "%sor%s+%d+%s*=%s*%d+",
                "%sand%s+%d+%s*=%s*%d+",
                -- 3. Stacked DDL/DML
                ";%s*drop%s+",
                ";%s*truncate%s+",
                ";%s*alter%s+",
                ";%s*create%s+",
                ";%s*insert%s+",
                ";%s*update%s+",
                ";%s*delete%s+",
                -- 4. Comentarios SQL
                "%-%-[%s%c]",
                "/%*.-%*/",
                -- 5. Time-based
                "sleep%s*%(",
                "benchmark%s*%(",
                "pg_sleep%s*%(",
                "waitfor%s+delay",
                -- 6. Error-based
                "extractvalue%s*%(",
                "updatexml%s*%(",
                -- 7. File ops
                "load_file%s*%(",
                "into%s+outfile",
                "into%s+dumpfile",
                -- 8. Schema enum
                "information_schema",
                -- 9. MSSQL stored procs
                "xp_cmdshell",
                "sp_executesql",
                -- 10. Hex payload (16+ hex chars)
                "0x%x%x%x%x%x%x%x%x%x%x%x%x%x%x%x%x",
                -- 11. CHAR/CHR multi-arg encoding
                "char%s*%(%s*%d+%s*,",
                "chr%s*%(%s*%d+%s*,",
                -- 12. OR string tautology (' or 'a'='a)
                "%sor%s+['\"]%w+['\"]%s*=%s*['\"]%w+['\"]",
              }

              -- URL decode (equivalente al t:urlDecode de OWASP CRS).
              local function urldecode(s)
                if not s then return "" end
                s = s:gsub("+", " ")
                s = s:gsub("%%(%x%x)", function(h)
                  return string.char(tonumber(h, 16))
                end)
                return s
              end

              local function inspect(target)
                if not target or target == "" then return nil end
                -- Doble pasada: primero raw lower, luego url-decoded lower
                -- (CRS aplica multiMatch sobre transformaciones encadenadas).
                local raw = string.lower(target)
                local dec = string.lower(urldecode(target))
                for _, p in ipairs(patterns) do
                  if string.match(raw, p) or string.match(dec, p) then
                    return p
                  end
                end
                return nil
              end

              function envoy_on_request(handle)
                local headers = handle:headers()
                local path = headers:get(":path") or ""
                local hit = inspect(path)
                if not hit then
                  local body = handle:body()
                  if body and body:length() > 0 then
                    local body_str = body:getBytes(0, body:length())
                    hit = inspect(body_str)
                  end
                end
                if hit then
                  handle:respond(
                    {
                      [":status"] = "403",
                      ["content-type"] = "application/json",
                      ["x-waf-block"] = "sqli",
                    },
                    '{"error":"blocked by mini-waf","reason":"sqli pattern"}'
                  )
                end
              end
