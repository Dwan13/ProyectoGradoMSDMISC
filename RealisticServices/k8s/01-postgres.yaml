apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: realistic
type: Opaque
stringData:
  POSTGRES_USER: mubench
  POSTGRES_PASSWORD: mubench
  POSTGRES_DB: mubench
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: realistic
data:
  01-init.sql: |
    CREATE TABLE IF NOT EXISTS app_users (
      id SERIAL PRIMARY KEY,
      username TEXT NOT NULL UNIQUE,
      email TEXT NOT NULL UNIQUE,
      created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    INSERT INTO app_users (id, username, email)
    VALUES
      (1, 'demo', 'demo@mubench.local'),
      (2, 'alice', 'alice@mubench.local'),
      (3, 'bob', 'bob@mubench.local')
    ON CONFLICT (id) DO NOTHING;
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: realistic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: pgdata
          emptyDir: {}
        - name: init-sql
          configMap:
            name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: realistic
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
