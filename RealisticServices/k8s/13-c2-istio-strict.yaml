# C2/istio_mtls — STRICT mTLS sólo en data-service (backend puro intra-cluster).
#
# Justificación metodológica:
#   - api-service: edge gateway, PERMISSIVE (acepta ingress sin sidecar).
#   - auth-service: front-door de autenticación (análogo a Auth0/Keycloak/Cognito);
#     debe aceptar tráfico externo legítimo (login del usuario final). Sin policy.
#   - data-service: backend puro (CRUD sobre Postgres); jamás expuesto al exterior.
#     Aquí se enforce STRICT mTLS + AuthorizationPolicy basada en identidad SPIFFE.
#
# Modelo de amenaza C2:
#   "atacante compromete un pod en el cluster (sin identidad mTLS) e intenta
#    pivotar lateralmente a data-service para exfiltrar datos de negocio".
#   STRICT bloquea ese movimiento lateral exigiendo identidad mTLS válida.
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: data-strict
  namespace: realistic
spec:
  selector: { matchLabels: { app: data-service } }
  mtls: { mode: STRICT }
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: data-allow-internal
  namespace: realistic
spec:
  selector: { matchLabels: { app: data-service } }
  action: ALLOW
  rules:
    - from:
        - source:
            principals: ["cluster.local/ns/realistic/sa/default"]
