# Despliegue de Postgres para entorno realista
# Namespace recomendado: mubench-real

---
apiVersion: v1
kind: Namespace
metadata:
  name: mubench-real
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: mubench-real
type: Opaque
stringData:
  POSTGRES_USER: mubench
  POSTGRES_PASSWORD: mubench
  POSTGRES_DB: mubench_real
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: mubench-real
data:
  01-init.sql: |
    CREATE TABLE IF NOT EXISTS app_users (
      id SERIAL PRIMARY KEY,
      username TEXT NOT NULL UNIQUE,
      email TEXT NOT NULL UNIQUE,
      created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_app_users_created_at ON app_users (created_at DESC);

    INSERT INTO app_users (username, email, created_at)
    SELECT
      'user_' || gs,
      'user_' || gs || '@mubench.local',
      NOW() - ((gs % 365) || ' days')::interval - ((gs % 24) || ' hours')::interval
    FROM generate_series(1, 10000) AS gs
    ON CONFLICT (username) DO NOTHING;
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: mubench-real
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: pgdata
          emptyDir: {}
        - name: init-sql
          configMap:
            name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: mubench-real
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
