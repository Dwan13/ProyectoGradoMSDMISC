apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: realistic-gateway
  namespace: realistic
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: mubench-tls
      hosts:
        - realistic.local

---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: realistic-vs
  namespace: realistic
spec:
  hosts:
    - realistic.local
  gateways:
    - realistic-gateway
  http:
    - match:
        - uri:
            prefix: /api/
      route:
        - destination:
            host: api-service
            port:
              number: 8080
    - match:
        - uri:
            prefix: /auth/
      route:
        - destination:
            host: auth-service
            port:
              number: 8080
