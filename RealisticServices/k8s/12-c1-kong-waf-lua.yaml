# Mini-WAF SQLi para Kong (KongPlugin pre-function + Lua)
# Subset reducido OWASP CRS REQUEST-942. Equivalente funcional al EnvoyFilter
# Lua de Istio (11-c1-istio-waf-lua.yaml) — mismos patrones, misma lógica.
# Se aplica a TODAS las rutas del Ingress vía annotation:
#   konghq.com/plugins: realistic-waf-sqli
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: realistic-waf-sqli
  namespace: realistic
plugin: pre-function
config:
  access:
    - |
      -- Mini-WAF SQLi — subset OWASP CRS REQUEST-942
      -- Mismos 12 patrones lógicos que el EnvoyFilter Istio.
      local patterns = {
        -- 1. UNION SELECT
        "union%s+select",
        "union%s+all%s+select",
        -- 2. OR/AND tautología numérica
        "%sor%s+%d+%s*=%s*%d+",
        "%sand%s+%d+%s*=%s*%d+",
        -- 3. Stacked DDL/DML
        ";%s*drop%s+",
        ";%s*truncate%s+",
        ";%s*alter%s+",
        ";%s*create%s+",
        ";%s*insert%s+",
        ";%s*update%s+",
        ";%s*delete%s+",
        -- 4. Comentarios SQL
        "%-%-[%s%c]",
        "/%*.-%*/",
        -- 5. Time-based
        "sleep%s*%(",
        "benchmark%s*%(",
        "pg_sleep%s*%(",
        "waitfor%s+delay",
        -- 6. Error-based
        "extractvalue%s*%(",
        "updatexml%s*%(",
        -- 7. File ops
        "load_file%s*%(",
        "into%s+outfile",
        "into%s+dumpfile",
        -- 8. Schema enum
        "information_schema",
        -- 9. MSSQL stored procs
        "xp_cmdshell",
        "sp_executesql",
        -- 10. Hex payload (16+ hex chars)
        "0x%x%x%x%x%x%x%x%x%x%x%x%x%x%x%x%x",
        -- 11. CHAR/CHR multi-arg encoding
        "char%s*%(%s*%d+%s*,",
        "chr%s*%(%s*%d+%s*,",
        -- 12. OR string tautology
        "%sor%s+['\"]%w+['\"]%s*=%s*['\"]%w+['\"]",
      }

      -- URL decode (equivalente al t:urlDecode de OWASP CRS).
      local function urldecode(s)
        if not s then return "" end
        s = s:gsub("+", " ")
        s = s:gsub("%%(%x%x)", function(h)
          return string.char(tonumber(h, 16))
        end)
        return s
      end

      local function inspect(target)
        if not target or target == "" then return nil end
        -- Doble pasada: primero raw lower, luego url-decoded lower
        -- (CRS aplica multiMatch sobre transformaciones encadenadas).
        local raw = string.lower(target)
        local dec = string.lower(urldecode(target))
        for _, p in ipairs(patterns) do
          if string.match(raw, p) or string.match(dec, p) then
            return p
          end
        end
        return nil
      end

      local path = kong.request.get_path() or ""
      local query = kong.request.get_raw_query() or ""
      local body = kong.request.get_raw_body() or ""

      local hit = inspect(path) or inspect(query) or inspect(body)
      if hit then
        kong.response.set_header("X-WAF-Block", "sqli")
        return kong.response.exit(403, {
          error = "blocked by mini-waf",
          reason = "sqli pattern",
        })
      end
